# Prepare and publish PyPI releases.
#
# Workflow:
#   1. Run "Release" manually from main with a bump type
#   2. The workflow opens a version-bump PR
#   3. The workflow validates and builds the release branch, merges the PR,
#      publishes the merged commit to PyPI, and creates the GitHub release
#
# Manual dispatch is the only release trigger. Merging arbitrary PRs must not
# publish, even when they touch pyproject.toml.
#
# Prerequisites (one-time setup):
#   - Create a PyPI account at https://pypi.org/account/register/
#   - Go to https://pypi.org/manage/account/publishing/
#   - Add a "pending publisher":
#       Owner:      ScienceIsNeato
#       Repository: slop-mop
#       Workflow:   release.yml
#       Environment: pypi
#   - (Optional) Do the same on https://test.pypi.org for staging

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent releases, but never cancel an in-progress publish. PyPI
# forbids re-uploading the same version, so a partial publish caused by
# cancellation would be permanently broken.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-context:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      version: ${{ steps.resolve.outputs.version }}
      previous_version: ${{ steps.resolve.outputs.previous_version }}
      tag: ${{ steps.resolve.outputs.tag }}
      release_branch: ${{ steps.resolve.outputs.release_branch }}
      release_pr_url: ${{ steps.release_pr.outputs.pr_url }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      release_sha: ${{ steps.resolve.outputs.commit_sha || steps.release_pr.outputs.release_sha || github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate manual release dispatch
        env:
          BUMP: ${{ github.event.inputs.bump }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Manual releases must be dispatched from main." >&2
            exit 1
          fi

          case "$BUMP" in
            patch|minor|major) ;;
            *)
              echo "Release workflow requires bump to be patch, minor, or major" >&2
              exit 1
              ;;
          esac

      - name: Sync main before manual version bump
        run: |
          git fetch origin main
          git pull --ff-only origin main

      - name: Resolve release version
        id: resolve
        env:
          BUMP: ${{ github.event.inputs.bump }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python <<'PY'
          import os
          import re
          import subprocess
          import tomllib
          from pathlib import Path


          def write_output(key: str, value: str) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")


          def project_version(text: str) -> str:
              return tomllib.loads(text)["project"]["version"]


          pyproject = Path("pyproject.toml")
          current_text = pyproject.read_text()
          current = project_version(current_text)
          commit_sha = ""
          release_branch = ""

          marker = f"[release-run:{os.environ['GITHUB_RUN_ID']}]"
          commit_sha = subprocess.run(
              [
                  "git",
                  "log",
                  "origin/main",
                  "--fixed-strings",
                  "--grep",
                  marker,
                  "-n",
                  "1",
                  "--format=%H",
              ],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.strip()
          if commit_sha:
              current_text = subprocess.run(
                  ["git", "show", f"{commit_sha}:pyproject.toml"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
              parent_text = subprocess.run(
                  ["git", "show", f"{commit_sha}^:pyproject.toml"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
              version = project_version(current_text)
              previous = project_version(parent_text)
              release_branch = f"release/v{version}"
          else:
              bump = os.environ["BUMP"]
              major, minor, patch = [int(part) for part in current.split(".")]
              if bump == "major":
                  major += 1
                  minor = 0
                  patch = 0
              elif bump == "minor":
                  minor += 1
                  patch = 0
              else:
                  patch += 1

              version = f"{major}.{minor}.{patch}"
              previous = current
              release_branch = f"release/v{version}"
              updated = re.sub(
                  r'^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  current_text,
                  count=1,
                  flags=re.MULTILINE,
              )
              if updated == current_text:
                  raise SystemExit("Could not update version in pyproject.toml")
              pyproject.write_text(updated)

          if version == previous:
              raise SystemExit("Release workflow requires a version bump")
          should_release = "true"

          tag = f"v{version}"
          tag_exists = subprocess.run(
              ["git", "ls-remote", "--exit-code", "--tags", "origin", tag],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
              check=False,
          ).returncode == 0
          if tag_exists:
              raise SystemExit(f"Tag {tag} already exists")

          previous_for_output = previous or "(missing)"
          write_output("should_release", should_release)
          write_output("version", version)
          write_output("previous_version", previous_for_output)
          write_output("tag", tag)
          write_output("commit_sha", commit_sha)
          write_output("release_branch", release_branch)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(
                      f"Release selected: {previous_for_output} -> {version} ({tag})\n"
                  )
          PY

      - name: Create or update release PR
        id: release_pr
        if: steps.resolve.outputs.commit_sha == ''
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          PREVIOUS_VERSION: ${{ steps.resolve.outputs.previous_version }}
          RELEASE_BRANCH: ${{ steps.resolve.outputs.release_branch }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$RELEASE_BRANCH"
          git add pyproject.toml
          git commit -m "chore: bump version to ${VERSION} for PyPI release [release-run:${GITHUB_RUN_ID}]"
          trap 'git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"' EXIT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "$RELEASE_BRANCH"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          PR_TITLE="chore: bump version to ${VERSION} for PyPI release"
          PR_BODY=$(printf '%s\n\n%s' \
            "Release ${PREVIOUS_VERSION} -> ${VERSION}." \
            "This PR was created by the Release workflow. The same run validates and builds this branch before merging and publishing the merged commit.")
          PR_URL="$(gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url // ""')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$RELEASE_BRANCH")"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "Release PR ready: $PR_URL"
              echo "The workflow will validate and build the release branch before merging."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  quality-gate:
    name: Quality Gate
    needs: release-context
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-context.outputs.release_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx --yes tsc

      - name: Run slop-mop on itself
        run: python -m slopmop.sm scour

  build:
    name: Build Package
    needs:
      - release-context
      - quality-gate
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package version matches release version
        run: |
          EXPECTED_VERSION="${{ needs.release-context.outputs.version }}"
          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$EXPECTED_VERSION" != "$TOML_VERSION" ]; then
            echo "Detected release version ($EXPECTED_VERSION) does not match pyproject.toml ($TOML_VERSION)"
            exit 1
          fi
          echo "Version match: $EXPECTED_VERSION"

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel in a clean venv
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sm --version
          sm --help >/dev/null
          TMP_REPO="$(mktemp -d)"
          cd "$TMP_REPO"
          git init -q
          printf "print('hello')\n" > hello.py
          sm init >/dev/null
          sm swab --help >/dev/null

  merge-release-pr:
    name: Merge Release PR
    needs:
      - release-context
      - quality-gate
      - build
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Merge or reuse release PR
        id: resolve
        env:
          EXISTING_COMMIT_SHA: ${{ needs.release-context.outputs.commit_sha }}
          PR_URL: ${{ needs.release-context.outputs.release_pr_url }}
          VERSION: ${{ needs.release-context.outputs.version }}
          PREVIOUS_VERSION: ${{ needs.release-context.outputs.previous_version }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$EXISTING_COMMIT_SHA" ]; then
            echo "commit_sha=$EXISTING_COMMIT_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$PR_URL" ]; then
            echo "::error::Release PR URL is missing."
            exit 1
          fi

          PR_TITLE="chore: bump version to ${VERSION} for PyPI release"
          gh pr merge "$PR_URL" \
            --squash \
            --delete-branch \
            --subject "$PR_TITLE" \
            --body "Release ${PREVIOUS_VERSION} -> ${VERSION}. [release-run:${GITHUB_RUN_ID}]"
          git fetch origin main
          echo "commit_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "Release PR merged: $PR_URL"
              echo "Publishing will continue against the merged origin/main commit."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  publish-pypi:
    name: Publish to PyPI
    needs:
      - release-context
      - merge-release-pr
      - build
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.merge-release-pr.outputs.commit_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build package for PyPI publish
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: GitHub Release
    needs:
      - release-context
      - merge-release-pr
      - publish-pypi
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.merge-release-pr.outputs.commit_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build package for GitHub Release assets
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-context.outputs.tag }}
          TARGET: ${{ needs.merge-release-pr.outputs.commit_sha }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" dist/* \
            --target "$TARGET" \
            --title "$TAG" \
            --generate-notes
