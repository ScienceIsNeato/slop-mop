# Publish to PyPI automatically when a release-bump PR lands on main.
#
# Workflow:
#   1. Run "Prepare Release" to create the version-bump PR
#   2. Review and merge that PR
#   3. This workflow detects the pyproject.toml version bump on main, or is
#      manually dispatched from main after the bump lands
#   4. CI builds the package, uploads to PyPI, and creates the tag/release
#
# Prerequisites (one-time setup):
#   - Create a PyPI account at https://pypi.org/account/register/
#   - Go to https://pypi.org/manage/account/publishing/
#   - Add a "pending publisher":
#       Owner:      ScienceIsNeato
#       Repository: slop-mop
#       Workflow:   release.yml
#       Environment: pypi
#   - (Optional) Do the same on https://test.pypi.org for staging

name: Release to PyPI

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish; must match pyproject.toml. Leave blank to use current."
        required: false
        type: string

# Prevent concurrent mainline releases, but never cancel an in-progress publish
# — PyPI forbids re-uploading the same version, so a partial publish caused by
# cancellation would be permanently broken.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-release:
    name: Detect Release Bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      previous_version: ${{ steps.detect.outputs.previous_version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Detect version bump in pyproject.toml
        id: detect
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          current = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          dispatch_version = os.environ.get("DISPATCH_VERSION", "").strip()
          ref_name = os.environ.get("GITHUB_REF_NAME", "")

          previous = current
          if event_name == "workflow_dispatch":
            if ref_name != "main":
              print("Manual PyPI releases must be dispatched from main.", file=sys.stderr)
              sys.exit(1)
            if dispatch_version and dispatch_version != current:
              print(
                f"Requested version {dispatch_version} does not match pyproject.toml {current}.",
                file=sys.stderr,
              )
              sys.exit(1)
            previous = "manual dispatch"
            should_release = "true"
          else:
            before_sha = os.environ.get("GITHUB_EVENT_BEFORE", "")
            null_sha = "0" * 40
            if before_sha and before_sha != null_sha:
              try:
                previous_text = subprocess.run(
                  ["git", "show", f"{before_sha}:pyproject.toml"],
                  capture_output=True,
                  text=True,
                  check=True,
                ).stdout
                previous = tomllib.loads(previous_text)["project"]["version"]
              except (
                subprocess.CalledProcessError,
                tomllib.TOMLDecodeError,
                KeyError,
              ):
                previous = ""
            should_release = "true" if current != previous else "false"

          tag = f"v{current}"
          previous_for_output = previous or "(missing)"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_release={should_release}\n")
              fh.write(f"version={current}\n")
              fh.write(f"previous_version={previous_for_output}\n")
              fh.write(f"tag={tag}\n")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                if should_release == "true":
                  fh.write(
                    f"Release detected: {previous_for_output} -> {current} ({tag})\n"
                  )
                else:
                  fh.write(
                    f"No release version bump detected in pyproject.toml ({current}).\n"
                  )
          PY

  quality-gate:
    name: Quality Gate
    needs: detect-release
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx --yes tsc

      - name: Run slop-mop on itself
        run: python -m slopmop.sm scour

  build:
    name: Build Package
    needs:
      - detect-release
      - quality-gate
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package version matches detected release version
        run: |
          EXPECTED_VERSION="${{ needs.detect-release.outputs.version }}"
          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$EXPECTED_VERSION" != "$TOML_VERSION" ]; then
            echo "❌ Detected release version ($EXPECTED_VERSION) does not match pyproject.toml ($TOML_VERSION)"
            exit 1
          fi
          echo "✅ Version match: $EXPECTED_VERSION"

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel in a clean venv
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sm --version
          sm --help >/dev/null
          TMP_REPO="$(mktemp -d)"
          cd "$TMP_REPO"
          git init -q
          printf "print('hello')\n" > hello.py
          sm init >/dev/null
          sm swab --help >/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs:
      - detect-release
      - build
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: GitHub Release
    needs:
      - detect-release
      - publish-pypi
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect-release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "✅ GitHub Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" dist/* \
            --target "${GITHUB_SHA}" \
            --title "$TAG" \
            --generate-notes
