# Prepare and publish PyPI releases.
#
# Workflow:
#   1. Run "Release" manually from main with a bump type
#   2. The workflow opens a version-bump PR, waits for green checks, and merges it
#   3. The same workflow run validates the merged commit, builds, publishes to
#      PyPI, and creates the GitHub release
#
# Manual dispatch is the only release trigger. Merging arbitrary PRs must not
# publish, even when they touch pyproject.toml.
#
# Prerequisites (one-time setup):
#   - Create a PyPI account at https://pypi.org/account/register/
#   - Go to https://pypi.org/manage/account/publishing/
#   - Add a "pending publisher":
#       Owner:      ScienceIsNeato
#       Repository: slop-mop
#       Workflow:   release.yml
#       Environment: pypi
#   - Add a RELEASE_PR_TOKEN secret from a fine-grained PAT or GitHub App token
#     that can create PRs, read checks, merge PRs, and trigger follow-up workflows
#   - (Optional) Do the same on https://test.pypi.org for staging

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent releases, but never cancel an in-progress publish. PyPI
# forbids re-uploading the same version, so a partial publish caused by
# cancellation would be permanently broken.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-context:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      version: ${{ steps.resolve.outputs.version }}
      previous_version: ${{ steps.resolve.outputs.previous_version }}
      tag: ${{ steps.resolve.outputs.tag }}
      release_branch: ${{ steps.resolve.outputs.release_branch }}
      release_pr_url: ${{ steps.release_pr.outputs.pr_url }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha || steps.release_pr.outputs.commit_sha || github.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Validate manual release dispatch
        env:
          BUMP: ${{ github.event.inputs.bump }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Manual releases must be dispatched from main." >&2
            exit 1
          fi

          case "$BUMP" in
            patch|minor|major) ;;
            *)
              echo "Release workflow requires bump to be patch, minor, or major" >&2
              exit 1
              ;;
          esac

      - name: Sync main before manual version bump
        run: |
          git fetch origin main
          git pull --ff-only origin main

      - name: Resolve release version
        id: resolve
        env:
          BUMP: ${{ github.event.inputs.bump }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path


          def write_output(key: str, value: str) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")


          def project_version(text: str) -> str:
              # Single source of truth: slopmop/_version.py.
              match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', text)
              if not match:
                  raise SystemExit("Could not find __version__ in slopmop/_version.py")
              return match.group(1)


          version_file = Path("slopmop/_version.py")
          current_text = version_file.read_text()
          current = project_version(current_text)
          commit_sha = ""
          release_branch = ""

          marker = f"[release-run:{os.environ['GITHUB_RUN_ID']}]"
          commit_sha = subprocess.run(
              [
                  "git",
                  "log",
                  "origin/main",
                  "--fixed-strings",
                  "--grep",
                  marker,
                  "-n",
                  "1",
                  "--format=%H",
              ],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.strip()
          if commit_sha:
              current_text = subprocess.run(
                  ["git", "show", f"{commit_sha}:slopmop/_version.py"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
              parent_text = subprocess.run(
                  ["git", "show", f"{commit_sha}^:slopmop/_version.py"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
              version = project_version(current_text)
              previous = project_version(parent_text)
              release_branch = f"release/v{version}"
          else:
              bump = os.environ["BUMP"]
              major, minor, patch = [int(part) for part in current.split(".")]
              if bump == "major":
                  major += 1
                  minor = 0
                  patch = 0
              elif bump == "minor":
                  minor += 1
                  patch = 0
              else:
                  patch += 1

              version = f"{major}.{minor}.{patch}"
              previous = current
              release_branch = f"release/v{version}"
              updated = re.sub(
                  r'^__version__\s*=\s*"[^"]+"',
                  f'__version__ = "{version}"',
                  current_text,
                  count=1,
                  flags=re.MULTILINE,
              )
              if updated == current_text:
                  raise SystemExit("Could not update __version__ in slopmop/_version.py")
              version_file.write_text(updated)

              # Propagate the new version into every file that mentions it
              # (README, machine-interface example, issue template, cursor
              # plugin manifest). One source, no drift.
              subprocess.run([sys.executable, "scripts/sync_version.py"], check=True)

          if version == previous:
              raise SystemExit("Release workflow requires a version bump")
          should_release = "true"

          tag = f"v{version}"
          tag_exists = subprocess.run(
              ["git", "ls-remote", "--exit-code", "--tags", "origin", tag],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
              check=False,
          ).returncode == 0
          if tag_exists:
              raise SystemExit(f"Tag {tag} already exists")

          previous_for_output = previous or "(missing)"
          write_output("should_release", should_release)
          write_output("version", version)
          write_output("previous_version", previous_for_output)
          write_output("tag", tag)
          write_output("commit_sha", commit_sha)
          write_output("release_branch", release_branch)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(
                      f"Release selected: {previous_for_output} -> {version} ({tag})\n"
                  )
          PY

      - name: Create release PR and merge after green checks
        id: release_pr
        if: steps.resolve.outputs.commit_sha == ''
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          PREVIOUS_VERSION: ${{ steps.resolve.outputs.previous_version }}
          RELEASE_BRANCH: ${{ steps.resolve.outputs.release_branch }}
          RELEASE_PR_TOKEN_CONFIGURED: ${{ secrets.RELEASE_PR_TOKEN != '' }}
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$RELEASE_PR_TOKEN_CONFIGURED" != "true" ]; then
            echo "::error::Manual releases require a RELEASE_PR_TOKEN secret so the release PR can trigger checks and the merge can trigger the publish workflow."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$RELEASE_BRANCH"
          git add -A
          git commit -m "chore: bump version to ${VERSION} for PyPI release [release-run:${GITHUB_RUN_ID}]"
          trap 'git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"' EXIT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "$RELEASE_BRANCH"

          PR_TITLE="chore: bump version to ${VERSION} for PyPI release"
          PR_BODY=$(printf '%s\n\n%s' \
            "Release ${PREVIOUS_VERSION} -> ${VERSION}." \
            "This PR was created by the Release workflow. After checks pass, the workflow merges it into main; the protected main-branch push then runs the publish path.")
          PR_URL="$(gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url // ""')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$RELEASE_BRANCH")"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          echo "Waiting for release PR checks to pass: $PR_URL"
          for attempt in $(seq 1 20); do
            CHECK_COUNT="$(gh pr checks "$PR_URL" --json name --jq 'length' 2>/dev/null || true)"
            if [ -n "$CHECK_COUNT" ] && [ "$CHECK_COUNT" != "0" ]; then
              break
            fi
            if [ "$attempt" = "20" ]; then
              echo "::error::No PR checks were reported. Confirm RELEASE_PR_TOKEN can trigger pull_request workflows."
              exit 1
            fi
            sleep 15
          done
          gh pr checks "$PR_URL" --watch --fail-fast
          gh pr merge "$PR_URL" \
            --squash \
            --delete-branch \
            --subject "$PR_TITLE" \
            --body "Release ${PREVIOUS_VERSION} -> ${VERSION}. [release-run:${GITHUB_RUN_ID}]"
          git fetch origin main
          echo "commit_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "Release PR merged: $PR_URL"
              echo "Publishing will continue in this workflow run against origin/main."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  quality-gate:
    name: Quality Gate
    needs: release-context
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.release-context.outputs.commit_sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx --yes tsc

      - name: Run slop-mop on itself
        run: python -m slopmop.sm scour

  build:
    name: Build Package
    needs:
      - release-context
      - quality-gate
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.commit_sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package version matches release version
        run: |
          EXPECTED_VERSION="${{ needs.release-context.outputs.version }}"
          SRC_VERSION=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('slopmop/_version.py').read_text()).group(1))")
          if [ "$EXPECTED_VERSION" != "$SRC_VERSION" ]; then
            echo "Detected release version ($EXPECTED_VERSION) does not match slopmop/_version.py ($SRC_VERSION)"
            exit 1
          fi
          echo "Version match: $EXPECTED_VERSION"

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel in a clean venv
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sm --version
          sm --help >/dev/null
          TMP_REPO="$(mktemp -d)"
          cd "$TMP_REPO"
          git init -q
          printf "print('hello')\n" > hello.py
          sm init >/dev/null
          sm swab --help >/dev/null

  publish-pypi:
    name: Publish to PyPI
    needs:
      - release-context
      - build
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.commit_sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build package for PyPI publish
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: true
          # PEP 740 provenance: explicit so it never silently depends on the
          # action's resolved default. Requires Trusted Publishing (already
          # wired via environment: pypi + id-token: write). (#269)
          attestations: true

  github-release:
    name: GitHub Release
    needs:
      - release-context
      - publish-pypi
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.commit_sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build package for GitHub Release assets
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-context.outputs.tag }}
          TARGET: ${{ needs.release-context.outputs.commit_sha }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" dist/* \
            --target "$TARGET" \
            --title "$TAG" \
            --generate-notes
