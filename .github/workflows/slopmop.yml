# Slop-Mop Dogfooding CI
# Runs slop-mop on itself to validate PRs, then runs integration tests in Docker.

name: slop-mop

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Slop-Mop Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx tsc

      - name: Run slop-mop on itself
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source .venv/bin/activate
          python -m slopmop.sm scour

  wait-for-bots:
    name: ⏳ Wait for External Bots
    runs-on: ubuntu-latest
    needs: integration  # run after all real CI — bots have had plenty of time to start
    if: github.event_name == 'pull_request'

    steps:
      - name: Wait for external check suites (Bugbot, etc.)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # By this point validate + integration have finished (~4-5 min).
          # Any external bot that's going to run (Bugbot, etc.) has had
          # plenty of time to register and start.
          #
          # Logic:
          #   - Check for in_progress external suites
          #   - If any: poll until they complete (up to 15 min)
          #   - If none: exit immediately (bot finished or was never scheduled)
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          POLL_INTERVAL=15
          MAX_POLLS=60  # 60 × 15s = 15 min

          echo "🔍 Checking for in-progress external check suites..."
          POLL=0
          while [ $POLL -lt $MAX_POLLS ]; do
            # Show what's still running
            gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-suites" \
              --jq '.check_suites[] | select(.app.slug != "github-actions") | select(.status == "in_progress") | "  🔄 \(.app.name) (\(.app.slug)): \(.status)"'

            IN_PROGRESS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-suites" \
              --jq '[.check_suites[] | select(.app.slug != "github-actions") | select(.status == "in_progress")] | length')

            if [ "$IN_PROGRESS" = "0" ]; then
              echo "✅ No external check suites in progress — clear to proceed."
              exit 0
            fi

            POLL=$((POLL + 1))
            echo "⏳ ${IN_PROGRESS} suite(s) still in progress (attempt ${POLL}/${MAX_POLLS})"
            sleep $POLL_INTERVAL
          done

          echo "❌ Timed out — external suite(s) still in progress after $((MAX_POLLS * POLL_INTERVAL))s."
          echo "Cannot reliably check PR comments while bots are still running."
          exit 1

  pr-comments:
    name: PR Comment Check
    runs-on: ubuntu-latest
    needs: wait-for-bots  # runs after CI + bot wait are both done
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install slop-mop
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Check for unresolved PR comments
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m slopmop.sm scour -g myopia:ignored-feedback --json --output-file .slopmop/ignored-feedback.json

      - name: Summarize ignored-feedback status
        id: ignored_feedback
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          path = Path('.slopmop/ignored-feedback.json')
          data = json.loads(path.read_text())

          summary = data.get('summary', {})
          warned = int(summary.get('warned', 0))
          results = data.get('results', [])
          detail = ''
          if results:
            detail = str(results[0].get('status_detail', ''))

          has_unresolved = warned > 0
          lines = [
            f"has_unresolved={'true' if has_unresolved else 'false'}",
            f"warned_count={warned}",
            f"status_detail={detail}",
          ]

          out_file = Path(__import__('os').environ['GITHUB_OUTPUT'])
          with out_file.open('a', encoding='utf-8') as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Publish PR comment advisory check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HAS_UNRESOLVED: ${{ steps.ignored_feedback.outputs.has_unresolved }}
          WARNED_COUNT: ${{ steps.ignored_feedback.outputs.warned_count }}
          STATUS_DETAIL: ${{ steps.ignored_feedback.outputs.status_detail }}
        run: |
          if [ "$HAS_UNRESOLVED" = "true" ]; then
            CONCLUSION="action_required"
            TITLE="PR comments need attention"
            SUMMARY="myopia:ignored-feedback reported ${WARNED_COUNT} warning(s) (${STATUS_DETAIL})."
            TEXT="There are unresolved PR review threads. This check is advisory (non-blocking) but should be cleared before merge."
          else
            CONCLUSION="success"
            TITLE="PR comments clear"
            SUMMARY="No unresolved PR comment threads detected."
            TEXT="myopia:ignored-feedback found no unresolved review threads."
          fi

          gh api \
            -X POST \
            "repos/${REPO}/check-runs" \
            -f name='PR Comment Advisory' \
            -f head_sha="$HEAD_SHA" \
            -f status='completed' \
            -f conclusion="$CONCLUSION" \
            -f output[title]="$TITLE" \
            -f output[summary]="$SUMMARY" \
            -f output[text]="$TEXT"

  integration:
    name: 🪣 Integration Tests
    runs-on: ubuntu-latest
    needs: validate  # only run when the repo itself is healthy

    steps:
      - name: Checkout slop-mop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install slop-mop and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        run: |
          pytest tests/integration/ -m integration -v --tb=short

