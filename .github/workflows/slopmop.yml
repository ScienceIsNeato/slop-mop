# Slop-Mop Dogfood Sanity Workflow
#
# This is intentionally downstream of the SARIF workflow so code-scanning
# is the first-class merge gate. We only run this final sanity check when
# the primary code-scanning workflow has already passed for the same PR
# head commit.

name: slop-mop downstream dogfood sanity

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["slop-mop primary code scanning gate"]
    types: [completed]

permissions:
  contents: read

jobs:
  unit-tests-windows:
    name: Unit tests (Windows)
    # Triggered via workflow_run after the primary code-scanning gate succeeds for a PR.
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e ".[all]"

      - name: Run validator and doctor unit tests
        run: python -m pytest tests/unit/test_subprocess_validator.py tests/unit/test_doctor.py tests/unit/test_doctor_checks.py tests/unit/test_release_script.py -v

  dogfood:
    name: Final Dogfood Sanity Check (blocking)
    # Only run for PR-triggered code-scanning runs that succeeded.
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx --yes tsc

      - name: Run final dogfood scour
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source .venv/bin/activate
          python -m slopmop.sm scour

