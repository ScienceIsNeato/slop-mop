# Primary workflow: slop-mop code scanning gate
#
# Runs slopmop's scour gates, emits SARIF, and uploads it so findings
# appear as inline PR annotations + entries in the Security tab. This
# is the first-class CI gate in the pipeline.
#
# Failures in this workflow block merge. Warnings remain warnings.
#
# The
# upload-sarif action handles the GitHub API plumbing — no tokens, no
# custom auth, works on any public repo out of the box.
#
# Why scour and not swab: scour is the PR-readiness gate set.  Swab is
# the every-commit quick check — you could SARIF-upload that too, but
# you'd be creating and resolving the same alerts many times per PR.
# One scour-SARIF per PR push gives a stable alert surface.
#
# Why continue-on-error on the scour step: we want the SARIF upload to
# happen whether gates pass or fail.  Failing gates are the POINT —
# that's when there's something to annotate.  The overall job still
# surfaces the exit code via the verdict step at the end, so branch
# protection rules can still block merges on gate failures.
#
# Why we don't generate partialFingerprints ourselves in CI: slopmop
# DOES generate them (see reporting/sarif.py), but upload-sarif would
# compute them too if we didn't — it reads the source files from the
# runner workspace.  We ship our own so the SARIF file is useful
# standalone (REST API upload, local inspection) but in this workflow
# either would work.
#
# ──────────────────────────────────────────────────────────────────
# Verifying this works (you can't see annotations on a clean repo)
# ──────────────────────────────────────────────────────────────────
# This workflow running on slop-mop itself produces an empty SARIF:
# slop-mop's gates pass on slop-mop's code.  Code Scanning ingests a
# valid document with zero results and shows nothing.  That proves
# the plumbing but not the payload.
#
# To see inline annotations for real, drop this workflow into
# bucket-o-slop (github.com/ScienceIsNeato/bucket-o-slop) — the
# integration-test fixture repo whose all-fail branch is broken in
# ways that trip every gate.  Open a PR from all-fail into all-pass
# and the diff lights up with dead-code, lint, type-error, and
# security annotations.
#
# Fixture-branch update policy:
# - Validate workflow/test additions on all-pass first
# - Then port to all-fail for alert-heavy validation/screenshot capture
# - Update mixed opportunistically when needed
#
# The integration tests in tests/integration/test_sarif_integration.py
# run this same all-fail fixture inside Docker and assert the SARIF
# is schema-valid with populated physicalLocation entries.  That
# proves the payload.  Uploading it to a real bucket-o-slop PR proves
# GitHub renders it.  Between the two, the whole pipeline is covered.

name: slop-mop primary code scanning gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly re-scan of the default branch — keeps the Security tab
  # fresh even during quiet periods.  Without this, alerts can go
  # stale when their underlying rules are updated.
  schedule:
    - cron: '0 6 * * 1'

# upload-sarif needs security-events: write.  actions: read lets it
# correlate the upload with the workflow run.  contents: read is the
# bare minimum for checkout.
permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

jobs:
  scan:
    name: Primary Code Scanning Gate (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # diff-cover and gate-dodging need history to compare
          # against the base branch.  Shallow clone (the default)
          # breaks both with cryptic "unknown revision" errors.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/find-duplicate-strings/package-lock.json

      - name: Install slopmop
        # ────────────────────────────────────────────────────────────
        # COPYING THIS TO YOUR REPO?  Change this line to:
        #
        #     pip install slopmop
        #
        # and also install whatever your project needs for gates to
        # run (pytest for untested-code, mypy for missing-annotations):
        #
        #     pip install -e .[dev]
        #
        # This workflow runs on slop-mop's own CI, which means the
        # slopmop it tests must be the slopmop in THIS commit — not
        # whatever stale version PyPI has.  `pip install .` installs
        # from the checkout.  On your repo you want PyPI's latest.
        #
        # [all] brings every tool extra (lint, typing, analysis,
        # security, testing) so ALL gates have their dependencies.
        #
        # We install into a project-local venv so that PROJECT-context
        # gates (untested-code, coverage-gaps) can find pytest via
        # has_project_venv() instead of warning and skipping.
        # ────────────────────────────────────────────────────────────
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[all]"

      - name: Build string-duplication tool
        run: |
          cd tools/find-duplicate-strings
          npm install
          npx --yes tsc

      - name: Run Primary Gate (scour -> SARIF)
        id: scour
        # Gates failing is EXPECTED — that's what produces findings.
        # We still want to upload the SARIF and let Code Scanning
        # render the annotations.  The verdict step below re-fails
        # the job so branch protection isn't bypassed.
        continue-on-error: true
        run: |
          source .venv/bin/activate
          sm scour \
            --sarif --output-file slopmop.sarif \
            --json-file slopmop-results.json \
            --no-json

      - name: Publish SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: slopmop.sarif
          # Distinct category lets you run slopmop alongside other
          # SARIF tools (CodeQL, semgrep) without them overwriting
          # each other's alerts.  GitHub keys alert state on
          # (category, ruleId, fingerprint).
          category: slopmop

      - name: Upload JSON scan report
        uses: actions/upload-artifact@v4
        with:
          name: slopmop-results
          path: slopmop-results.json

      - name: Verify coverage report exists
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo "coverage.xml found; coverage upload steps can run."
          else
            echo "coverage.xml was not produced by sm scour; skipping coverage upload."
          fi

      - name: Upload coverage report
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: false

      - name: Summarise SARIF failures
        # When scour fails, parse the SARIF and surface the top
        # failing rule IDs directly in the check output so reviewers
        # don't have to click through to the Security tab.
        if: always() && steps.scour.outcome == 'failure'
        run: |
          source .venv/bin/activate
          python3 scripts/summarize_scour_failure.py \
            --sarif slopmop.sarif \
            --json slopmop-results.json \
            --step-summary-path "$GITHUB_STEP_SUMMARY" \
            | tee .scour-failure-summary.txt

      - name: Enforce Primary Gate Verdict
        # Re-surface the scour exit code so branch protection rules
        # that require this job to pass actually mean something.
        # Without this, continue-on-error above would let everything
        # through.  The SARIF is uploaded either way — this just
        # controls the green/red check mark.
        if: always() && steps.scour.outcome == 'failure'
        run: |
          if [ -f .scour-failure-summary.txt ]; then
            echo "::group::Scour failure summary"
            cat .scour-failure-summary.txt
            echo "::endgroup::"
          fi
          echo "::notice::Local triage command: python scripts/ci_scan_triage.py --run-id ${GITHUB_RUN_ID} --show-low-coverage"
          echo "::error::slopmop scour failed"
          exit 1

  # -------------------------------------------------------------------
  # Docker integration tests
  #
  # Builds the slop-mop Docker image, clones bucket-o-slop inside
  # containers, and runs `sm swab` against each fixture branch
  # (all-pass, all-fail, mixed).  Validates install, init, and gate
  # results match expectations.
  #
  # Runs in parallel with the scan job — no dependency.
  # -------------------------------------------------------------------
  docker-integration:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest

      - name: Run Docker integration tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/test_docker_install.py \
            -v --tb=long -m integration 2>&1 | tee docker-test-output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-integration-output
          path: docker-test-output.txt
