<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Human-readable sm swab output</title>
  <desc id="desc">A terminal-style screenshot showing sm swab running quality gates and ending with no slop detected.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="760" fill="#f7f5ef"/>
  <rect x="88" y="72" width="1104" height="616" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="88" y="72" width="1104" height="54" rx="18" fill="#1f2937"/>
  <circle cx="123" cy="99" r="7" fill="#f87171"/>
  <circle cx="147" cy="99" r="7" fill="#fbbf24"/>
  <circle cx="171" cy="99" r="7" fill="#34d399"/>
  <text x="206" y="106" class="sans" font-size="18" fill="#d1d5db">sm swab</text>

  <text x="128" y="168" class="mono" font-size="25" fill="#e5e7eb">$ sm swab</text>
  <text x="128" y="218" class="mono" font-size="25" fill="#f8fafc">scanning the code for slop to mop</text>

  <text x="128" y="278" class="mono" font-size="24" fill="#facc15">Overconfidence [4/4]</text>
  <text x="128" y="322" class="mono" font-size="23" fill="#a7f3d0">OK  untested-code.py              32.5s</text>
  <text x="128" y="360" class="mono" font-size="23" fill="#a7f3d0">OK  type-blindness.py              2.3s</text>
  <text x="128" y="398" class="mono" font-size="23" fill="#a7f3d0">OK  coverage-gaps.py               1.1s</text>

  <text x="128" y="446" class="mono" font-size="24" fill="#f0abfc">Myopia [4/4]</text>
  <text x="128" y="490" class="mono" font-size="23" fill="#a7f3d0">OK  string-duplication.py         17.3s</text>
  <text x="128" y="528" class="mono" font-size="23" fill="#a7f3d0">OK  vulnerability-blindness.py     8.9s</text>
  <text x="128" y="566" class="mono" font-size="23" fill="#a7f3d0">OK  code-sprawl                   12.9s</text>

  <rect x="128" y="610" width="1024" height="18" rx="9" fill="#334155"/>
  <rect x="128" y="610" width="1024" height="18" rx="9" fill="#22c55e"/>
  <text x="128" y="674" class="mono" font-size="27" fill="#f8fafc">NO SLOP DETECTED · 14 checks passed</text>
</svg>
